; Draft for Casbin conf (obsolete)
; =============================================
; 1. Request Definition
; =============================================
; Defines the structure of an access request.
; - `r`: Request tuple.
; - `sub`: Subject (e.g., user, bot, or group making the request).
; - `obj`: Object (e.g., resource or resource group being accessed).
; - `act`: Action (e.g., read, write, delete).
; Example request: ("alice@kronicle", "channel:climate-data", "read")
[request_definition]
r = sub, dom, obj, act, time

; =============================================
; 2. Policy Definition
; =============================================
; Defines the structure of a policy rule.
; - `p`: Policy tuple.
; - `sub`: Subject (e.g., user, bot, or group).
; - `obj`: Object (e.g., resource or resource group).
; - `act`: Action (e.g., read, write, delete).
; - `eft`: The binary "Effect" of the rule (allow | deny). This enables explicit deny rules.
; Example policy: ("alice@kronicle", "channel:climate-data", "read", "allow")
[policy_definition]
p = sub, dom, obj, act, time_start, time_end, eft

; =============================================
; 3. Role Definition
; =============================================
; Defines the structure of role assignments (for RBAC).
; - `g`: Role assignment tuple.
; - `v0`: User or entity being assigned a role.
; - `v1`: Role or group being assigned.
; Example role assignment: ("alice@kronicle", "admin")
; The underscore `_` means "any number of values" (e.g., for role hierarchies).
[role_definition]
g = _, _, _

; =============================================
; 4. Policy Effect
; =============================================
; Defines how multiple policies are combined to make a decision.
; - `e`: Policy effect logic.
; - `some(where (p.eft == allow))`: If ANY matching policy allows access, grant it.
; - `!some(where (p.eft == deny))`: If ANY matching policy denies access, block it.
; This ensures that deny rules override allow rules.
[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

; =============================================
; 5. Matchers
; =============================================
; Defines how requests are matched against policies.
; - `m`: Matcher logic.
; - `g(r.sub, p.sub)`: Check if the request's subject matches the policy's subject,
;   OR if the subject is in a group/role that matches (via the `g` role definition).
; - `keyMatch(r.obj, p.obj)`: Check if the request's object matches the policy's object.
;   Supports wildcards (e.g., "channel:climate-data/*" matches all rows in the channel).
; - `r.act == p.act`: Check if the request's action matches the policy's action.
; - `p.eft == allow`: Only consider policies with an "allow" effect for granting access.
; Example: If the request is ("alice@kronicle", "channel:climate-data", "read"),
;   the matcher checks if there's a policy like ("alice@kronicle", "channel:climate-data", "read", "allow").
[matchers]
m = g(r.sub, p.sub, r.dom) && \
    keyMatch(r.obj, p.obj) && \
    r.act == p.act && \
    (p.time_start == "*" || r.time >= p.time_start) && \
    (p.time_end == "*" || r.time <= p.time_end)
