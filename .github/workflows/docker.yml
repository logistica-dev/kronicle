# .github/workflows/docker.yml
name: Build, test & push Kronicle Docker image

on:
  push:
    branches: [main]
    tags: ['0.*'] # triggers on any tag starting with 0.
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v6

      # Step 2: Set up QEMU for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Step 4: Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Step 5: Build a temporary "init" image for DB initialization
      - name: Build Kronicle Init Image
        run: |
          docker build \
            -f docker/init/Dockerfile \
            -t kronicle-init:latest \
            .

      # Step 6: Create a dedicated Docker network for DB + init container
      - name: Create Docker network
        run: docker network create kronicle-net || true

      # Step 7: Start temporary TimescaleDB for testing
      - name: Start temporary TimescaleDB
        run: |
          docker run -d \
            --name kronicle-test-db \
            --network kronicle-net \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            -p 5433:5432 \
            --health-cmd="pg_isready -U $${POSTGRES_USER}" \
            --health-interval=2s \
            --health-timeout=2s \
            --health-retries=30 \
            timescale/timescaledb:latest-pg16

          echo "Waiting for DB to be ready..."
          MAX_WAIT=60
          WAITED=0
          while true; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' kronicle-test-db)
            if [ "$STATUS" = "healthy" ]; then
              echo "DB is ready"
              break
            elif [ "$STATUS" = "unhealthy" ]; then
              echo "DB failed to start"
              docker logs kronicle-test-db
              exit 1
            fi
            sleep 1
            WAITED=$((WAITED + 1))
            if [ "$WAITED" -ge "$MAX_WAIT" ]; then
              echo "DB did not become healthy within ${MAX_WAIT}s"
              docker logs kronicle-test-db
              exit 1
            fi
          done

      # Step 8: Run Kronicle DB initialization inside the image
      - name: Run Kronicle DB init
        env:
          KRONICLE_DB_HOST: kronicle-test-db
          KRONICLE_DB_PORT: 5432
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KRONICLE_CHAN_CREDS: ${{ secrets.KRONICLE_CHAN_CREDS }}
          KRONICLE_RBAC_CREDS: ${{ secrets.KRONICLE_RBAC_CREDS }}
          KRONICLE_SU_INFO: ${{ secrets.KRONICLE_SU_INFO }}
        run: |
          docker run --rm \
            --network kronicle-net \
            -e KRONICLE_DB_HOST \
            -e KRONICLE_DB_PORT \
            -e POSTGRES_DB \
            -e POSTGRES_USER \
            -e POSTGRES_PASSWORD \
            -e KRONICLE_CHAN_CREDS \
            -e KRONICLE_RBAC_CREDS \
            -e KRONICLE_SU_INFO \
            kronicle-init:latest

      # Step 9: Tear down the temporary DB
      - name: Stop temporary DB
        run: docker stop kronicle-test-db && docker rm kronicle-test-db

      # Step 10: Build and push the multi-arch Docker image
      - name: Build and Push Kronicle
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          tags: |
            ghcr.io/${{ github.repository_owner }}/kronicle:latest
            ghcr.io/${{ github.repository_owner }}/kronicle:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/kronicle:${{ github.ref_name }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kronicle:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kronicle:cache,mode=max
