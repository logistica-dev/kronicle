# ./docker-compose.ci.yml
version: "3.9"

services:
  # --------------------------
  # TimescaleDB / PostgreSQL
  # --------------------------
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: kronicle-ci-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      retries: 15
      timeout: 2s

  # --------------------------
  # Kronicle DB/init container
  # --------------------------
  init:
    build:
      context: .
      dockerfile: docker/init/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      KRONICLE_DB_HOST: ${KRONICLE_DB_HOST}
      KRONICLE_DB_PORT: ${KRONICLE_DB_PORT}
      KRONICLE_DB_NAME: ${KRONICLE_DB_NAME}

      KRONICLE_CHAN_CREDS: ${KRONICLE_CHAN_CREDS}
      KRONICLE_RBAC_CREDS: ${KRONICLE_RBAC_CREDS}

      KRONICLE_SU_INFO: ${KRONICLE_SU_INFO}
    restart: "no"
    entrypoint:
      ["/opt/kronicle/.venv/bin/python", "/opt/kronicle/scripts/init/init.py"]
