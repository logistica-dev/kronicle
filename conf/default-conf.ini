# ./conf/default-conf.ini
; ------------------------------------------------------------
; Kronicle default configuration
; ------------------------------------------------------------

[app]
; ----- This application's own metadata
; - version: application version
; - name: application name
; - id: fixed UUID for identifying this instance (used in prefixes)
; - description: description of the service
; - host: network interface to bind to (use 0.0.0.0 inside container)
; - port: port to listen on
; - openapi_url: path where OpenAPI docs are served
; - env: runtime environment, options: dev, prod, stage
version='0.0.1'
name='Kronicle'
id='defa0172-5a86-43ac-82e2-7ae30cbc71f2'
description='FastAPI-powered TimescaleDB microservice for storing time-series measurements'
openapi_url='/openapi.json'
env=dev

[auth]
; ----- Password policy settings
; pwd_min_length: minimum password length
; pwd_require_uppercase / lowercase / digits / special: enforce character types
; pwd_special_chars: allowed special characters in passwords
pwd_min_length=12
pwd_require_uppercase=true
pwd_require_lowercase=true
pwd_require_digits=true
pwd_require_special=true
pwd_special_chars='!@%^*()_+-=[]{}:,.?'

[jwt]
; ----- JWT authentication settings
; - expiration_minutes: token lifetime
; - algorithm: signing algorithm (HS256, HS384, HS512)
; - secret: secret key for signing tokens (auto-generated if blank)
expiration_minutes = 5
algorithm = HS256
; secret is generated automatically if not set

[db]
; ----- Database credentials are read from environment variables:
;
; Core DB:
;   KRONICLE_DB_NAME     - database name
;   KRONICLE_DB_HOST     - host to connect to (e.g., localhost or postgres container)
;   KRONICLE_DB_PORT     - port (default 5432)
;
; Channel DB user:
;   KRONICLE_CHAN_CREDS  - base64url encoded string of "username:password"
;
; RBAC DB user:
;   KRONICLE_RBAC_CREDS  - base64url encoded string of "username:password"
;
; ----- How to encode in base64url?
; CLI:
;   echo -n "chanuser:secretpwd" | base64 | tr '+/' '-_' | tr -d '='
;   export KRONICLE_CHAN_CREDS=<resulting string>
;
