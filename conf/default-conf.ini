[app]
version='0.0.1'
name='Kronicle'
id='defa0172-5a86-43ac-82e2-7ae30cbc71f2'
description='FastAPI-powered TimescaleDB microservice for storing time-series measurements'
host=localhost
port=8000
openapi_url='/openapi.json'

[auth]
pwd_min_length=12
pwd_require_uppercase=true
pwd_require_lowercase=true
pwd_require_digits=true
pwd_require_special=true
pwd_special_chars='!@%^*()_+-=[]{}:,.?'

[admin]
credentials = "S3JvbmljbGVBcmNob246JGFyZ29uMmlkJHY9MTkkbT02NTUzNix0PTMscD00JDY5R21pQjNlR0sySnlRMXZiQ2MvT0EkU3dGTFBGVStoeEJUY1RHcGkyQXpWTUhBcnNnWjBPRk1LQVVhbGhNaUdTdw"

[db]
; Port for the local container
db_port=5432
db_address=localhost

; Credentials
db_usr=kronicle_chan_usr
db_pwd=kronicle_chan_pwd

; Name of the DB that will be used
db_name=kronicle_db

; Local folder for persistent data
db_dir=${HOME}/kronicle_db/psql

; Connection URL
db_connection_url=postgresql://${db_usr}:${db_pwd}@${db_address}:${db_port}/${db_name}

; SU Connection URL
su_usr=postgres
su_pwd=postgres
su_url=postgresql://${su_usr}:${su_pwd}@${db_address}:${db_port}/postgres

[rbac]
; Port for the local container
db_port=5432
db_address=localhost

; Credentials
db_usr=kronicle_rbac_usr
db_pwd=kronicle_rbac_pwd

; Name of the DB that will be used
db_name=kronicle_rbac

; Local folder for persistent data
db_dir=${HOME}/kronicle_db/psql

; Connection URL
db_connection_url=postgresql://${db_usr}:${db_pwd}@${db_address}:${db_port}/${db_name}

; SU Connection URL
su_usr=postgres
su_pwd=postgres
su_url=postgresql://${su_usr}:${su_pwd}@${db_address}:${db_port}/postgres

[docker]
; Timescale DB Docker image
timescaledb_img='timescale/timescaledb:latest-pg17'

; Name for the local container
container_name='kronicle-db-dev'
